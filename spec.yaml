id: patrol_effort_table

requirements:
  # ecoscope-platform 2.16.3 is the release that carries the patrol summary-metric
  # tasks (wildlife-dynamics/ecoscope#749) and the spatial-grouper resolver tasks.
  - name: ecoscope-platform
    version: ">=2.16.3, <2.17.0"
    channel: https://repo.prefix.dev/ecoscope-workflows/
  - name: ecoscope-workflows-ext-custom
    version: 0.1.0rc18
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
  # ecoscope-platform/ext-custom require pydeck ==0.9.2, but the custom channel
  # hosts a stub pydeck 0.0.x that shadows conda-forge under strict channel
  # priority. Route pydeck to conda-forge explicitly (same pattern as
  # encounter-rate and wt-download-patrols).
  - name: pydeck
    version: "0.9.2"
    channel: conda-forge

rjsf-overrides:
  properties:
    # Patrols are fetched with the combined patrols+events params task (same ER
    # query logic as patrol-track-density-map); event_types is partial-bound to
    # [] so the form only shows patrol types.
    "Patrol Types.properties.er_patrol_params.properties.patrol_types.ecoscope:transform":
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: patrol_type
          depends_on: properties.er_client_name.properties.data_source.properties.name
    "Patrol Types.properties.er_patrol_params.title": ""
    "Patrol Types.properties.er_patrol_params.properties.patrol_types.description": >-
      Specify the patrol type(s) to analyze (optional). Leave this section empty to analyze all patrol types.

    # --- Group Data: grouper override (labeled Category dropdown + Time + Spatial) ---
    # Patrol Status is deliberately absent from the Category options: it is
    # attached per-patrol, so grouping by it would duplicate the Aggregator's
    # patrol_status option without adding a distinct view.
    "Group Data.properties.groupers.title": ""
    "Group Data.properties.groupers.properties.groupers.description": ""
    "Group Data.properties.groupers.properties.groupers.items.anyOf":
      - {"$ref": "#/$defs/ValueGrouper"}
      - {"$ref": "#/$defs/TemporalGrouper"}
      - {"$ref": "#/$defs/SpatialGrouper"}
    # Spatial grouper options enumerate the ER site's spatial feature groups
    # (events/patrols workflow pattern).
    "Group Data.properties.groupers.properties.groupers.ecoscope:transform":
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: spatial_feature_group
          depends_on: properties.er_client_name.properties.data_source.properties.name

    # --- Configurable Summary Table: category column (groupby_cols) ---
    "Patrol Effort Summary.properties.summary_groupby.title": ""
    "Patrol Effort Summary.properties.summary_groupby.properties.vars.title": "Aggregator"
    "Patrol Effort Summary.properties.summary_groupby.properties.vars.description": "Category to group summary rows by. Default: Patrol Subject (ranger)."
    "Patrol Effort Summary.properties.summary_groupby.properties.vars.default": ["patrol_subject"]
    "Patrol Effort Summary.properties.summary_groupby.properties.vars.items.oneOf":
      - {const: "patrol_subject", title: "Patrol Subject"}
      - {const: "patrol_type__value", title: "Patrol Type"}
      - {const: "patrol_status", title: "Patrol Status"}

    # --- Configurable Summary Table: preset metric list (set_patrol_summary_metrics) ---
    # Defaults (all six current metrics) come from the task signature. Blank the
    # task-instance header so only the array field's title renders (no duplicate).
    "Patrol Effort Summary.properties.summary_metrics.title": ""
    "Patrol Effort Summary.properties.summary_metrics.properties.metrics.title": "Summary Metrics"

    # --- Filter Data: filter card (applies to the patrol tracks) ---
    "Filter Data.properties.patrol_filters.title": ""
    "Filter Data.properties.patrol_filters.properties.bounding_box.description": >-
      Only include patrol observations whose coordinates fall inside this
      bounding box.
    "Filter Data.properties.patrol_filters.properties.filter_point_coords.description": >-
      Exclude observations recorded at these exact coordinates (e.g. known
      bad GPS fixes).
    "Filter Data.properties.patrol_filters.properties.trajectory_segment_filter.description": >-
      Drop trajectory segments outside these length / time / speed bounds (e.g. to remove
      implausible jumps).

  $defs:
    ValueGrouper:
      title: "Category"
      type: "object"
      properties:
        index_name:
          title: "Index Name"
          type: "string"
          oneOf:
            # patrol_type__value (not download's patrol_type): the trajectory
            # branch keeps that column name, which the summary Aggregator also
            # references.
            - const: "patrol_serial_number"
              title: "Patrol Serial Number"
            - const: "patrol_type__value"
              title: "Patrol Type"
            - const: "patrol_subject"
              title: "Patrol Subject"

  uiSchema:
    Patrol Types.er_patrol_params.patrol_types.items.ui:help: >-
      If you are on Ecoscope Desktop, "Patrol Type" values can be found in your EarthRanger Admin site under Activity → Patrol Types.
    Filter Data.patrol_filters.filter_point_coords.items.ui:options.label: false
    # Preset metric rows: per-branch uiSchema (one entry per union member, in
    # order). ui:options.label false hides the branch heading (the selector
    # already names it); the hidden metric widget hides the discriminator
    # dropdown (auto-filled from the branch default). NOTE: when a branch is
    # selected these entries REPLACE the base items uiSchema, so the item-level
    # label ("Summary Metrics-N") renders from the base one untouched.
    "Patrol Effort Summary.summary_metrics.metrics.items.oneOf":
      - {"ui:options": {"label": false}, "metric": {"ui:widget": "hidden"}}
      - {"ui:options": {"label": false}, "metric": {"ui:widget": "hidden"}}
      - {"ui:options": {"label": false}, "metric": {"ui:widget": "hidden"}}
      - {"ui:options": {"label": false}, "metric": {"ui:widget": "hidden"}}
      - {"ui:options": {"label": false}, "metric": {"ui:widget": "hidden"}}
      - {"ui:options": {"label": false}, "metric": {"ui:widget": "hidden"}}
      - {"ui:options": {"label": false}, "metric": {"ui:widget": "hidden"}}

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

workflow:
  # ---------- Setup ----------
  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details

  - name: Data Source
    id: er_client_name
    task: set_er_connection

  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: '%d %b %Y %H:%M:%S %Z'

  - name: Extract Timezone Selection
    id: get_timezone
    task: get_timezone_from_time_range
    partial:
      time_range: ${{ workflow.time_range.return }}

  # ---------- Data Fetching (patrols only) ----------
  # Same ER query logic as patrol-track-density-map, with event_types bound to
  # [] so no event params surface on the form and no events are unpacked
  # downstream.
  - title: Patrol Types
    type: task-group
    description: " "
    tasks:
      - name: Patrol Params
        id: er_patrol_params
        task: set_patrols_and_patrol_events_params
        partial:
          client: ${{ workflow.er_client_name.return }}
          time_range: ${{ workflow.time_range.return }}
          event_types: []
          include_patrol_details: true
          raise_on_empty: false
          truncate_to_time_range: true
          include_null_geometry: true
          sub_page_size: 100

      - name: Prefetch Patrols
        id: prefetch_patrols
        task: get_patrols_from_combined_params
        partial:
          combined_params: ${{ workflow.er_patrol_params.return }}

      - name: Get Patrol Observations
        id: patrol_obs
        task: get_patrol_observations_from_patrols_df_and_combined_params
        partial:
          patrols_df: ${{ workflow.prefetch_patrols.return }}
          combined_params: ${{ workflow.er_patrol_params.return }}

  # ---------- Filter Data (patrol tracks) ----------
  - title: Filter Data
    type: task-group
    description: " "
    tasks:
      - name: Filters
        id: patrol_filters
        task: set_traj_filters

  # Split the combined filter config into the pieces each consumer needs.
  - name: Split Bounding Box
    id: bounding_box
    task: get_bounding_box
    partial:
      filters: ${{ workflow.patrol_filters.return }}

  - name: Split Point Coordinates
    id: filter_point_coords
    task: get_filter_point_coords
    partial:
      filters: ${{ workflow.patrol_filters.return }}

  - name: Split Segment Filter
    id: segment_filter
    task: get_segment_filter
    partial:
      filters: ${{ workflow.patrol_filters.return }}

  # ---------- Group Data (dashboard groupers; default [] -> single view) ----------
  - title: Group Data
    type: task-group
    description: >-
      Configure how patrols are grouped (by category, temporal index or spatial
      feature group) and split into per-group dashboard views.
    tasks:
      - name: Group Data
        id: groupers
        task: set_groupers

  # Resolve spatial groupers: fetch the referenced ER spatial feature groups and
  # bake them into the grouper objects (events/patrols workflow pattern). With no
  # spatial grouper configured these are no-ops and resolved_groupers passes the
  # groupers through unchanged. All downstream grouper consumers use
  # resolved_groupers, never groupers directly.
  - task: extract_spatial_grouper_feature_group_names
    id: spatial_group_ids
    partial:
      groupers: ${{ workflow.groupers.return }}

  - task: get_spatial_features_group
    id: fetch_all_spatial_feature_groups
    partial:
      client: ${{ workflow.er_client_name.return }}
    map:
      argnames: spatial_features_group_name
      argvalues: ${{ workflow.spatial_group_ids.return }}

  - task: resolve_spatial_feature_groups_for_spatial_groupers
    id: resolved_groupers
    skipif:
      conditions:
        - never
    partial:
      groupers: ${{ workflow.groupers.return }}
      spatial_feature_groups: ${{ workflow.fetch_all_spatial_feature_groups.return }}

  - name: Summary Table Title
    id: set_summary_title
    task: set_string_var
    partial:
      var: "Patrol Effort Summary"

  # ---------- Process Patrols ----------
  - title: Process Patrols
    type: task-group
    description: "Convert patrol observations to trajectory segments and tag patrol date."
    tasks:
      - name: Convert Patrols to Timezone
        id: convert_patrols_tz
        task: convert_values_to_timezone
        partial:
          df: ${{ workflow.patrol_obs.return }}
          timezone: ${{ workflow.get_timezone.return }}
          columns:
            - patrol_start_time
            - patrol_end_time
            - fixtime

      # Coordinate/bounding-box filter from the Filter Data card.
      - name: Filter Patrol Observations
        id: filter_patrol_obs
        task: apply_reloc_coord_filter
        partial:
          df: ${{ workflow.convert_patrols_tz.return }}
          bounding_box: ${{ workflow.bounding_box.return }}
          filter_point_coords: ${{ workflow.filter_point_coords.return }}
          roi_gdf: null
          roi_name: null
          reset_index: false

      # Trajectory segment filter from the same Filter Data card.
      - name: Relocations to Trajectory
        id: patrol_traj
        task: relocations_to_trajectory
        partial:
          relocations: ${{ workflow.filter_patrol_obs.return }}
          trajectory_segment_filter: ${{ workflow.segment_filter.return }}

      - name: Rename Trajectory Columns
        id: traj_rename_cols
        task: map_columns
        partial:
          df: ${{ workflow.patrol_traj.return }}
          drop_columns: []
          retain_columns: []
          rename_columns:
            extra__patrol_subject: patrol_subject
            extra__patrol_id: patrol_id
            extra__patrol_serial_number: patrol_serial_number
            extra__patrol_type__value: patrol_type__value
            extra__patrol_status: patrol_status
          raise_if_not_found: false   # patrol_type__value / patrol_status only needed if used as category

      # Patrol Days = nunique(segment_start_date) per category in summarize_df =
      # distinct calendar days with patrol MOVEMENT ("active days").
      # column_prefix is bound (not user-facing): with the default prefix the
      # generated column is deterministically `segment_start_date`, which the
      # "Patrol Days" metric (nunique) references.
      - name: Add Patrol Date
        id: traj_with_date
        task: decompose_datetime
        partial:
          df: ${{ workflow.traj_rename_cols.return }}
          datetime_column: segment_start
          components:
            - date
          remove_source: false
          column_prefix: null

      # Temporal index so Time groupers from the Group Data card can split the
      # tracks (download-patrols pattern; no-op when no temporal grouper is set).
      - name: Add Temporal Index to Patrol Tracks
        id: traj_add_temporal_index
        task: add_temporal_index
        partial:
          df: ${{ workflow.traj_with_date.return }}
          time_col: segment_start
          groupers: ${{ workflow.resolved_groupers.return }}
          cast_to_datetime: true
          format: mixed

      # Spatial index so Spatial groupers from the Group Data card can split the
      # tracks by feature-group geometry (no-op when no spatial grouper is set).
      - name: Add Spatial Index to Patrol Tracks
        id: traj_add_spatial_index
        task: add_spatial_index
        partial:
          gdf: ${{ workflow.traj_add_temporal_index.return }}
          groupers: ${{ workflow.resolved_groupers.return }}

  # ---------- Split ----------
  # Serial numbers are ints — cast the grouper category columns to string
  # before split (download-patrols pattern).
  - name: Cast Patrol Track Columns
    id: traj_cols_to_string
    task: convert_column_values_to_string
    partial:
      df: ${{ workflow.traj_add_spatial_index.return }}
      columns: ["patrol_serial_number", "patrol_type__value"]

  - name: Split Patrol Tracks by Group
    id: split_traj_groups
    task: split_groups
    partial:
      df: ${{ workflow.traj_cols_to_string.return }}
      groupers: ${{ workflow.resolved_groupers.return }}

  # ---------- Patrol Effort Summary (configurable, grouped) ----------
  - title: Patrol Effort Summary
    type: task-group
    description: "Per-category patrol metrics. Choose the aggregator column and which metrics to show."
    tasks:
      # The card follows task order: Aggregator (its own tiny task) above the
      # metric rows; summarize_df is fully partial-bound and stays off the form.
      - name: Aggregator
        id: summary_groupby
        task: set_list_of_string_vars

      - name: Summary Metrics
        id: summary_metrics
        task: set_patrol_summary_metrics

      - name: Summarize Patrol Effort
        id: summary_table_df
        task: summarize_df
        partial:
          reset_index: true
          groupby_cols: ${{ workflow.summary_groupby.return }}
          summary_params: ${{ workflow.summary_metrics.return }}
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_traj_groups.return }}

      - name: Rename Category Key
        id: summary_rename
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          # One entry per Aggregator option — only the chosen ones are present
          # (raise_if_not_found false skips the rest).
          rename_columns:
            patrol_subject: Patrol Subject
            patrol_type__value: Patrol Type
            patrol_status: Patrol Status
          raise_if_not_found: false
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.summary_table_df.return }}

      - name: Draw Summary Table
        id: summary_table
        task: draw_table
        partial:
          columns: null            # render all columns (category + every configured metric)
          widget_id: ${{ workflow.set_summary_title.return }}
          table_config:
            enable_sorting: true
            enable_filtering: false
            enable_download: true
            hide_header: false
        mapvalues:
          argnames: dataframe
          argvalues: ${{ workflow.summary_rename.return }}

      - name: Persist Summary Table
        id: summary_html
        task: persist_text
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: summary_table
        mapvalues:
          argnames: text
          argvalues: ${{ workflow.summary_table.return }}

      - name: Create Summary Table Widget
        id: summary_widget
        task: create_table_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.set_summary_title.return }}
        map:
          argnames: [view, data]
          argvalues: ${{ workflow.summary_html.return }}

      - name: Merge Summary Table Views
        id: summary_widget_merged
        task: merge_widget_views
        partial:
          widgets: ${{ workflow.summary_widget.return }}

  # ---------- Dashboard ----------
  - name: Create Dashboard
    id: patrol_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return }}
      widgets:
        - ${{ workflow.summary_widget_merged.return }}
      groupers: ${{ workflow.resolved_groupers.return }}
      time_range: ${{ workflow.time_range.return }}
