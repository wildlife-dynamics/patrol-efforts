id: patrol_efforts

requirements:
  # DEV MODE — developing the summarize_df coverage aggregators +
  # calculate_patrol_coverage against the editable local ecoscope checkout
  # (branch feat/patrol-coverage-tasks). ext-custom must ALSO be editable here:
  # the published ext-custom conda recipe hard-depends on conda ecoscope-platform
  # (>=2.11.6), which pins pandera 0.24 and conflicts with the editable ecoscope
  # (pandera 0.28). ext-custom's pypi [project].dependencies omit ecoscope-platform,
  # so the editable install drops the conda platform and the conflict with it.
  # Restore the pinned conda reqs below (bumped to the release that carries these
  # tasks) before publish; CI rejects path/editable requirements.
  # python pin keeps the ephemeral env off 3.14+ (missing transitive wheels).
  - name: python
    version: "3.12.*"
  # Channel-bearing conda req so the discovery/runtime solve registers the
  # repo.prefix.dev alias and can resolve the auto-injected wt-task / wt-runner.
  - name: wt-task
    version: ">=0.1.3,<1.0.0"
    channel: https://repo.prefix.dev/ecoscope-workflows/
  # Geospatial / scientific native stack provided by conda (mirrors the
  # ecoscope-dev workspace) so the editable ecoscope's heavy deps (pyproj,
  # shapely, gdal, proj, geos via geopandas/rasterio) are prebuilt binaries
  # rather than source-built by uv.
  - name: numpy
    version: ">=2,<2.1"
    channel: conda-forge
  - name: pyarrow
    version: ">=20,<24"
    channel: conda-forge
  - name: pandas
    version: "<3"
    channel: conda-forge
  - name: geopandas
    version: "*"
    channel: conda-forge
  - name: rasterio
    version: "*"
    channel: conda-forge
  - name: pydeck
    version: "==0.0.2"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
  # ext-custom pins setuptools<=81; conda otherwise resolves 82.x.
  - name: setuptools
    version: "<81"
    channel: conda-forge
  - name: ecoscope
    path: /Users/yunwu/MEP/wt-tasks/ecoscope
    editable: true
    extras: ["platform", "mapping", "analysis"]
  - name: ecoscope-workflows-ext-custom
    path: /Users/yunwu/MEP/wt-tasks/ecoscope-workflow-task-library/src/ecoscope-workflows-ext-custom
    editable: true
  # - name: ecoscope-platform
  #   version: ">=2.11.14, <2.12.0"
  #   channel: https://repo.prefix.dev/ecoscope-workflows/
  # - name: ecoscope-workflows-ext-custom
  #   version: 0.1.0rc6
  #   channel: https://repo.prefix.dev/ecoscope-workflows-custom/

rjsf-overrides:
  properties:
    # Patrols and their events are fetched together (one combined params object).
    "Patrol and Event Types.properties.er_patrol_and_events_params.properties.patrol_types.ecoscope:transform":
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: patrol_type
          depends_on: properties.er_client_name.properties.data_source.properties.name
    "Patrol and Event Types.properties.er_patrol_and_events_params.properties.event_types.ecoscope:transform":
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: event_type
          depends_on: properties.er_client_name.properties.data_source.properties.name
    "Patrol and Event Types.properties.er_patrol_and_events_params.properties.patrol_types.description": "Specify the patrol type(s) to analyze (optional). Leave empty to analyze all patrol types."
    "Patrol and Event Types.properties.er_patrol_and_events_params.properties.event_types.description": "Specify the event type(s) to map (optional). Leave empty to include all event types reported during the selected patrols."

    groupers.properties.groupers.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: spatial_feature_group
          depends_on: properties.er_client_name.properties.data_source.properties.name

    "Map Configuration.properties.base_map_defs.properties.base_maps.default":
      - url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}"
        opacity: 1.0
      - url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        opacity: 0.5

    # --- Configurable Summary Table: category column (groupby_cols) ---
    "Patrol Effort Summary.properties.summary_table_df.properties.groupby_cols.title": "Aggregator"
    "Patrol Effort Summary.properties.summary_table_df.properties.groupby_cols.description": "Column to aggregate (group) summary rows by. Default: patrol subject (ranger). Other options: patrol_type__value, patrol_status."
    "Patrol Effort Summary.properties.summary_table_df.properties.groupby_cols.default": ["patrol_subject"]
    "Patrol Effort Summary.properties.summary_table_df.properties.groupby_cols.items.oneOf":
      - {const: "patrol_subject", title: "Patrol Subject"}
      - {const: "patrol_type__value", title: "Patrol Type"}
      - {const: "patrol_status", title: "Patrol Status"}

    # --- Configurable Summary Table: metric list (summary_params) ---
    "Patrol Effort Summary.properties.summary_table_df.properties.summary_params.title": "Summary Metrics"
    "Patrol Effort Summary.properties.summary_table_df.properties.summary_params.description": "Columns shown in the summary table. Add or remove rows to customize. 'Merged/Unmerged Area Covered' use the Swath Width on the row."
    "Patrol Effort Summary.properties.summary_table_df.properties.summary_params.default":
      - display_name: "Patrol Count"
        aggregator: nunique
        column: patrol_id
      - display_name: "Total Distance (km)"
        aggregator: sum
        column: dist_meters
        original_unit: m
        new_unit: km
        decimal_places: 1
      - display_name: "Total Duration (hrs)"
        aggregator: sum
        column: timespan_seconds
        original_unit: s
        new_unit: h
        decimal_places: 1
      - display_name: "Patrol Days"
        aggregator: nunique
        column: segment_start_date
      - display_name: "Merged Area Covered (km²)"
        aggregator: merged_coverage_area
        swath_width_meters: 500.0
        decimal_places: 1
      - display_name: "Unmerged Area Covered (km²)"
        aggregator: unmerged_coverage_area
        swath_width_meters: 500.0
        decimal_places: 1

    # --- Map Configuration: per-layer category colour selectors (classifier) ---
    "Map Configuration.properties.set_traj_color_column.properties.var.title": "Colour Tracks By"
    "Map Configuration.properties.set_traj_color_column.properties.var.default": "patrol_subject"
    "Map Configuration.properties.set_traj_color_column.properties.var.oneOf":
      - {const: "patrol_subject", title: "Patrol Subject"}
      - {const: "patrol_type__value", title: "Patrol Type"}
      - {const: "patrol_status", title: "Patrol Status"}
    "Map Configuration.properties.set_event_color_column.properties.var.title": "Colour Events By"
    "Map Configuration.properties.set_event_color_column.properties.var.default": "event_type"
    "Map Configuration.properties.set_event_color_column.properties.var.oneOf":
      - {const: "event_type", title: "Event Type"}
      - {const: "event_category", title: "Event Category"}

    # --- Coverage map weighting (time vs distance) ---
    "Patrol Coverage Map.properties.grouped_coverage_density.properties.sum_column.title": "Coverage Weighting"
    "Patrol Coverage Map.properties.grouped_coverage_density.properties.sum_column.description": "Weight each grid cell by total patrol time (timespan_seconds) or distance travelled (dist_meters)."
    "Patrol Coverage Map.properties.grouped_coverage_density.properties.sum_column.default": "timespan_seconds"
    "Patrol Coverage Map.properties.grouped_coverage_density.properties.sum_column.enum": ["timespan_seconds", "dist_meters"]

  uiSchema:
    Patrols & Events Map.events_filter.filter_point_coords.items.ui:options.label: false

task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped

workflow:
  # ---------- Setup ----------
  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details

  - name: Data Source
    id: er_client_name
    task: set_er_connection

  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: '%d %b %Y %H:%M:%S'

  - name: Extract Timezone Selection
    id: get_timezone
    task: get_timezone_from_time_range
    partial:
      time_range: ${{ workflow.time_range.return }}

  # ---------- Data Fetching (patrols + their events, together) ----------
  - title: Patrol and Event Types
    type: task-group
    description: "Fetch patrols and the events reported during them in one combined query."
    tasks:
      - name: Patrol and Event Params
        id: er_patrol_and_events_params
        task: set_patrols_and_patrol_events_params
        partial:
          client: ${{ workflow.er_client_name.return }}
          time_range: ${{ workflow.time_range.return }}
          include_patrol_details: true
          raise_on_empty: false
          truncate_to_time_range: true
          include_null_geometry: true
          sub_page_size: 100

      - name: Prefetch Patrols
        id: prefetch_patrols
        task: get_patrols_from_combined_params
        partial:
          combined_params: ${{ workflow.er_patrol_and_events_params.return }}

      - name: Get Patrol Observations
        id: patrol_obs
        task: get_patrol_observations_from_patrols_df_and_combined_params
        partial:
          patrols_df: ${{ workflow.prefetch_patrols.return }}
          combined_params: ${{ workflow.er_patrol_and_events_params.return }}

      - name: Unpack Patrol Events
        id: patrol_events
        task: unpack_events_from_patrols_df_and_combined_params
        partial:
          patrols_df: ${{ workflow.prefetch_patrols.return }}
          combined_params: ${{ workflow.er_patrol_and_events_params.return }}

      - name: Resolve Event Type Display Names
        id: event_type_display_names
        task: get_event_type_display_names_from_events
        partial:
          client: ${{ workflow.er_client_name.return }}
          events_gdf: ${{ workflow.patrol_events.return }}
          append_category_names: "duplicates"

  # Dashboard groupers — defined AFTER the data fetch (default [] -> single view).
  - name: Dashboard Groupers
    id: groupers
    task: set_groupers

  - name: Summary Table Title
    id: set_summary_title
    task: set_string_var
    partial:
      var: "Patrol Effort Summary"

  - name: Map Title
    id: set_map_title
    task: set_string_var
    partial:
      var: "Patrols & Events Map"

  - name: Coverage Map Title
    id: set_coverage_map_title
    task: set_string_var
    partial:
      var: "Patrol Coverage Map"

  - name: Event Density Title
    id: set_event_density_title
    task: set_string_var
    partial:
      var: "Event Density Map"

  # All map configuration in one card: the per-layer colour-category selectors
  # for the Patrols & Events map plus the shared base layers.
  - title: Map Configuration
    type: task-group
    description: "Colour the Patrols & Events map layers and choose the base layers."
    tasks:
      - name: Track Colour Category
        id: set_traj_color_column
        task: set_string_var

      - name: Event Colour Category
        id: set_event_color_column
        task: set_string_var

      - name: Map Base Layers
        id: base_map_defs
        task: set_base_maps

  # ---------- Process Patrols ----------
  - title: Process Patrols
    type: task-group
    description: "Convert patrol observations to trajectory segments and tag patrol date."
    tasks:
      - name: Convert Patrols to Timezone
        id: convert_patrols_tz
        task: convert_values_to_timezone
        partial:
          df: ${{ workflow.patrol_obs.return }}
          timezone: ${{ workflow.get_timezone.return }}
          columns:
            - patrol_start_time
            - patrol_end_time
            - fixtime

      - name: Transform Observations to Relocations
        id: patrol_reloc
        task: process_relocations
        partial:
          observations: ${{ workflow.convert_patrols_tz.return }}
          relocs_columns:
            - patrol_id
            - patrol_start_time
            - patrol_end_time
            - patrol_type__value
            - patrol_type__display
            - patrol_serial_number
            - patrol_status
            - patrol_subject
            - groupby_col
            - fixtime
            - junk_status
            - extra__source
            - geometry
          filter_point_coords:
            - x: 180.0
              y: 90.0
            - x: 0.0
              y: 0.0
            - x: 1.0
              y: 1.0

      - name: Relocations to Trajectory
        id: patrol_traj
        task: relocations_to_trajectory
        partial:
          relocations: ${{ workflow.patrol_reloc.return }}

      - name: Rename Trajectory Columns
        id: traj_rename_cols
        task: map_columns
        partial:
          df: ${{ workflow.patrol_traj.return }}
          drop_columns: []
          retain_columns: []
          rename_columns:
            extra__patrol_subject: patrol_subject
            extra__patrol_id: patrol_id
            extra__patrol_type__value: patrol_type__value
            extra__patrol_status: patrol_status
          raise_if_not_found: false   # patrol_type__value / patrol_status only needed if used as category

      # Patrol Days = nunique(segment_start_date) per category in summarize_df =
      # distinct calendar days with patrol MOVEMENT ("active days").
      - name: Add Patrol Date
        id: traj_with_date
        task: ecoscope_workflows_ext_custom.tasks.transformation.decompose_datetime
        partial:
          df: ${{ workflow.traj_rename_cols.return }}
          datetime_column: segment_start
          components:
            - date
          remove_source: false

      # Colour tracks by the chosen category BEFORE split so colours stay consistent across group views.
      - name: Tracks Colormap
        id: traj_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.traj_with_date.return }}
          input_column_name: ${{ workflow.set_traj_color_column.return }}
          colormap: ["#FF9600", "#F23B0E", "#A100CB", "#F04564", "#03421A", "#3089FF", "#E26FFF", "#8C1700", "#002960", "#FFD000", "#B62879", "#680078", "#005A56", "#0056C7", "#331878", "#E76826"]
          output_column_name: patrol_traj_colormap

  # ---------- Process Events ----------
  - title: Process Events
    type: task-group
    description: "Convert patrol-event times and colour them by the chosen category."
    tasks:
      - name: Convert Events to Timezone
        id: convert_events_tz
        task: convert_values_to_timezone
        partial:
          df: ${{ workflow.event_type_display_names.return }}
          timezone: ${{ workflow.get_timezone.return }}
          columns:
            - time

      - name: Filter Event Locations
        id: events_filter
        task: apply_reloc_coord_filter
        partial:
          df: ${{ workflow.convert_events_tz.return }}
          roi_gdf: null
          roi_name: null
          reset_index: true

      # Colour events by the chosen category BEFORE split so colours stay consistent across group views.
      - name: Events Colormap
        id: events_colormap
        task: apply_color_map
        partial:
          df: ${{ workflow.events_filter.return }}
          input_column_name: ${{ workflow.set_event_color_column.return }}
          colormap: tab20b
          output_column_name: event_type_colormap

  # ---------- Shared splits ----------
  - name: Split Patrol Tracks by Group
    id: split_traj_groups
    task: split_groups
    partial:
      df: ${{ workflow.traj_colormap.return }}
      groupers: ${{ workflow.groupers.return }}

  - name: Split Events by Group
    id: split_event_groups
    task: split_groups
    partial:
      df: ${{ workflow.events_colormap.return }}
      groupers: ${{ workflow.groupers.return }}

  # ---------- Patrol Effort Summary (configurable, grouped) ----------
  - title: Patrol Effort Summary
    type: task-group
    description: "Per-category patrol metrics. Choose the aggregator column and which metrics to show."
    tasks:
      - name: Summarize Patrol Effort
        id: summary_table_df
        task: summarize_df
        partial:
          reset_index: true
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_traj_groups.return }}

      - name: Rename Category Key
        id: summary_rename
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          rename_columns:
            patrol_subject: Ranger
          raise_if_not_found: false
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.summary_table_df.return }}

      - name: Draw Summary Table
        id: summary_table
        task: draw_table
        partial:
          columns: null            # render all columns (category + every configured metric)
          widget_id: ${{ workflow.set_summary_title.return }}
          table_config:
            enable_sorting: true
            enable_filtering: false
            enable_download: true
            hide_header: false
        mapvalues:
          argnames: dataframe
          argvalues: ${{ workflow.summary_rename.return }}

      - name: Persist Summary Table
        id: summary_html
        task: persist_text
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: summary_table
        mapvalues:
          argnames: text
          argvalues: ${{ workflow.summary_table.return }}

      - name: Create Summary Table Widget
        id: summary_widget
        task: create_table_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.set_summary_title.return }}
        map:
          argnames: [view, data]
          argvalues: ${{ workflow.summary_html.return }}

      - name: Merge Summary Table Views
        id: summary_widget_merged
        task: merge_widget_views
        partial:
          widgets: ${{ workflow.summary_widget.return }}

  # ---------- Patrols & Events Map (grouped tracks + event points) ----------
  - title: Patrols & Events Map
    type: task-group
    description: "Patrol tracks and event points, each coloured by a chosen category."
    tasks:
      # Rename DISPLAY-only columns. The colour-category columns (patrol_subject /
      # patrol_type__value / patrol_status) are left raw so the chosen one is
      # still present for the legend label_column lookup.
      - name: Rename Track Columns for Display
        id: traj_display_rename
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          rename_columns:
            segment_start: "Start"
            speed_kmhr: "Speed (kph)"
          raise_if_not_found: false
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_traj_groups.return }}

      - name: Create Track Polyline Layer
        id: traj_polyline_layer
        task: create_polyline_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          layer_style:
            color_column: patrol_traj_colormap
            get_width: 3
            width_units: pixels
            cap_rounded: true
            opacity: 1
          legend:
            label_column: ${{ workflow.set_traj_color_column.return }}
            color_column: patrol_traj_colormap
          tooltip_columns: ["patrol_subject", "Start", "Speed (kph)"]
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.traj_display_rename.return }}

      # Rename DISPLAY-only columns. The colour-category columns (event_type /
      # event_category) are left raw so the chosen one is still present for the
      # legend label_column lookup.
      - name: Rename Event Columns for Display
        id: events_display_rename
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          rename_columns:
            time: "Event Time"
          raise_if_not_found: false
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.split_event_groups.return }}

      - name: Create Event Point Layer
        id: event_point_layer
        task: create_point_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          layer_style:
            fill_color_column: event_type_colormap
            get_radius: 5
          legend:
            label_column: ${{ workflow.set_event_color_column.return }}
            color_column: event_type_colormap
          tooltip_columns: ["Event Time", "event_type"]
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.events_display_rename.return }}

      # Zip track + event layers by group key -> [track_layer, event_layer] per group.
      - name: Zip Map Layers by Group
        id: map_layers_zip
        task: groupbykey
        skipif:
          conditions:
            - any_dependency_skipped
            - all_keyed_iterables_are_skips
          unpack_depth: 1
        partial:
          iterables:
            - ${{ workflow.traj_polyline_layer.return }}
            - ${{ workflow.event_point_layer.return }}

      - name: Draw Ecomap
        id: map_ecomap
        task: draw_ecomap
        partial:
          title: null
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: top-left
          legend_style:
            title: "Tracks / Events"
            format_title: true
            placement: bottom-right
          static: false
          max_zoom: 20
          widget_id: ${{ workflow.set_map_title.return }}
        mapvalues:
          argnames: geo_layers           # receives the [track_layer, event_layer] list per group
          argvalues: ${{ workflow.map_layers_zip.return }}

      - name: Persist Ecomap
        id: map_ecomap_html
        task: persist_text
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: ranger_map
        mapvalues:
          argnames: text
          argvalues: ${{ workflow.map_ecomap.return }}

      - name: Create Map Widget
        id: map_widget
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.set_map_title.return }}
        map:
          argnames: [view, data]
          argvalues: ${{ workflow.map_ecomap_html.return }}

      - name: Merge Map Views
        id: map_widget_merged
        task: merge_widget_views
        partial:
          widgets: ${{ workflow.map_widget.return }}

  # ---------- Patrol Coverage Map (gridded time/distance density) ----------
  - title: Patrol Coverage Map
    type: task-group
    description: "Grid heatmap of patrol effort, weighted by total time or distance per cell."
    tasks:
      - name: Coverage Meshgrid
        id: coverage_meshgrid
        task: create_meshgrid
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          aoi: ${{ workflow.traj_with_date.return }}
          intersecting_only: false

      - name: Calculate Patrol Effort per Cell
        id: grouped_coverage_density
        task: calculate_feature_density
        # sum_column is NOT in partial -> user-facing (Coverage Weighting dropdown).
        partial:
          meshgrid: ${{ workflow.coverage_meshgrid.return }}
          geometry_type: line
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.split_traj_groups.return }}

      - name: Sort Coverage Values
        id: coverage_sorted
        task: sort_values
        partial:
          column_name: density
          ascending: true
          na_position: last
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.grouped_coverage_density.return }}

      - name: Drop NaN Coverage Cells
        id: coverage_drop_nan
        task: drop_nan_values_by_column
        partial:
          column_name: density
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.coverage_sorted.return }}

      - name: Classify Coverage Values
        id: coverage_classify
        task: apply_classification
        partial:
          input_column_name: density
          output_column_name: density_bins
          classification_options:
            scheme: equal_interval
            k: 10
          label_options:
            label_ranges: true
            label_decimals: 0
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.coverage_drop_nan.return }}

      - name: Coverage Colormap
        id: coverage_colormap
        task: apply_color_map
        partial:
          input_column_name: density_bins
          colormap: viridis
          output_column_name: density_colormap
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.coverage_classify.return }}

      - name: Rename Coverage Output
        id: coverage_rename
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          rename_columns:
            density: "Patrol Effort"
          raise_if_not_found: true
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.coverage_colormap.return }}

      - name: Create Coverage Polygon Layer
        id: coverage_layer
        task: create_polygon_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          layer_style:
            fill_color_column: density_colormap
            get_line_width: 0
            opacity: 0.4
          legend:
            label_column: density_bins
            color_column: density_colormap
          tooltip_columns:
            - "Patrol Effort"
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.coverage_rename.return }}

      - name: Draw Coverage Ecomap
        id: coverage_ecomap
        task: draw_ecomap
        partial:
          title: null
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: top-left
          legend_style:
            title: "Patrol Effort"
            format_title: false
            placement: bottom-right
          static: false
          max_zoom: 20
          widget_id: ${{ workflow.set_coverage_map_title.return }}
        mapvalues:
          argnames: geo_layers
          argvalues: ${{ workflow.coverage_layer.return }}

      - name: Persist Coverage Ecomap
        id: coverage_html
        task: persist_text
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: coverage_map
        mapvalues:
          argnames: text
          argvalues: ${{ workflow.coverage_ecomap.return }}

      - name: Create Coverage Map Widget
        id: coverage_widget
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.set_coverage_map_title.return }}
        map:
          argnames: [view, data]
          argvalues: ${{ workflow.coverage_html.return }}

      - name: Merge Coverage Views
        id: coverage_widget_merged
        task: merge_widget_views
        partial:
          widgets: ${{ workflow.coverage_widget.return }}

  # ---------- Event Density Map (gridded counts) ----------
  - title: Event Density Map
    type: task-group
    description: "Grid heatmap of event counts per cell."
    tasks:
      - name: Event Meshgrid
        id: event_meshgrid
        task: create_meshgrid
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          aoi: ${{ workflow.events_colormap.return }}
          intersecting_only: false

      - name: Calculate Event Counts per Cell
        id: grouped_event_density
        task: calculate_feature_density
        partial:
          meshgrid: ${{ workflow.event_meshgrid.return }}
          geometry_type: point
          sum_column: null
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.split_event_groups.return }}

      - name: Sort Event Counts
        id: ed_sorted
        task: sort_values
        partial:
          column_name: density
          ascending: true
          na_position: last
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.grouped_event_density.return }}

      - name: Drop NaN Event Cells
        id: ed_drop_nan
        task: drop_nan_values_by_column
        partial:
          column_name: density
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.ed_sorted.return }}

      - name: Classify Event Counts
        id: ed_classify
        task: apply_classification
        partial:
          input_column_name: density
          output_column_name: density_bins
          classification_options:
            scheme: equal_interval
            k: 10
          label_options:
            label_ranges: true
            label_decimals: 0
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.ed_drop_nan.return }}

      - name: Event Count Colormap
        id: ed_colormap
        task: apply_color_map
        partial:
          input_column_name: density_bins
          colormap: RdYlGn_r
          output_column_name: density_colormap
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.ed_classify.return }}

      - name: Rename Event Density Output
        id: ed_rename
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          rename_columns:
            density: "Event Count"
          raise_if_not_found: true
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.ed_colormap.return }}

      - name: Create Event Density Polygon Layer
        id: ed_layer
        task: create_polygon_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          layer_style:
            fill_color_column: density_colormap
            get_line_width: 0
            opacity: 0.4
          legend:
            label_column: density_bins
            color_column: density_colormap
          tooltip_columns:
            - "Event Count"
        mapvalues:
          argnames: geodataframe
          argvalues: ${{ workflow.ed_rename.return }}

      - name: Draw Event Density Ecomap
        id: ed_ecomap
        task: draw_ecomap
        partial:
          title: null
          tile_layers: ${{ workflow.base_map_defs.return }}
          north_arrow_style:
            placement: top-left
          legend_style:
            title: "Number of Events"
            format_title: false
            placement: bottom-right
          static: false
          max_zoom: 20
          widget_id: ${{ workflow.set_event_density_title.return }}
        mapvalues:
          argnames: geo_layers
          argvalues: ${{ workflow.ed_layer.return }}

      - name: Persist Event Density Ecomap
        id: ed_html
        task: persist_text
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_suffix: event_density_map
        mapvalues:
          argnames: text
          argvalues: ${{ workflow.ed_ecomap.return }}

      - name: Create Event Density Widget
        id: ed_widget
        task: create_map_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.set_event_density_title.return }}
        map:
          argnames: [view, data]
          argvalues: ${{ workflow.ed_html.return }}

      - name: Merge Event Density Views
        id: ed_widget_merged
        task: merge_widget_views
        partial:
          widgets: ${{ workflow.ed_widget.return }}

  # ---------- Dashboard ----------
  - name: Create Dashboard
    id: ranger_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return }}
      widgets:
        - ${{ workflow.summary_widget_merged.return }}
        - ${{ workflow.map_widget_merged.return }}
        - ${{ workflow.coverage_widget_merged.return }}
        - ${{ workflow.ed_widget_merged.return }}
      groupers: ${{ workflow.groupers.return }}
      time_range: ${{ workflow.time_range.return }}
