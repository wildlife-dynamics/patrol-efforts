base:
  name: Base
  description: Mocked IO — primary development case (no credentials needed).
  mock_io: true
  params:
    workflow_details:
      name: "Patrol Effort Table"
      description: "Per-category patrol effort summary table."
    er_client_name:
      data_source:
        name: "er_asia"
    time_range:
      since: "2015-01-10T00:00:00"
      until: "2015-02-28T23:59:59"
      timezone:
        label: "UTC (UTC+00:00)"
        tzCode: "UTC"
        name: "(UTC+00:00) UTC"
        utc: "+00:00"
    er_patrol_params:
      patrol_types: ["demo_patrol"]
    groupers:
      groupers: []                      # single view; set a grouper to split
    summary_groupby:
      # two aggregators: exercises multi-column grouping + header renames
      vars: ["patrol_subject", "patrol_type__value"]
    summary_metrics:
      metrics:
        - {metric: patrol_count}
        - {metric: total_distance, unit: km}
        - {metric: total_duration, unit: h}
        - {metric: patrol_days}
        - {metric: area_covered_merged, swath_width_meters: 500.0}
        - {metric: area_covered_unmerged, swath_width_meters: 500.0}
        # exercises the custom escape hatch incl. checkbox-gated unit conversion
        - {metric: custom, display_name: "Avg Leg Distance (km)", aggregator: mean,
           column: dist_meters, convert_units: true, original_unit: m, new_unit: km}

grouped:
  name: Grouped
  description: >-
    Mocked IO — exercises the Group Data card: a value grouper (patrol serial
    number, hits the traj rename + int->string casts) plus a monthly temporal
    grouper (hits add_temporal_index).
  mock_io: true
  params:
    workflow_details:
      name: "Patrol Effort Table"
      description: "Per-category patrol effort summary table."
    er_client_name:
      data_source:
        name: "er_asia"
    time_range:
      since: "2015-01-10T00:00:00"
      until: "2015-02-28T23:59:59"
      timezone:
        label: "UTC (UTC+00:00)"
        tzCode: "UTC"
        name: "(UTC+00:00) UTC"
        utc: "+00:00"
    er_patrol_params:
      patrol_types: ["demo_patrol"]
    groupers:
      groupers:
        - index_name: "patrol_serial_number"
        - temporal_index: "%B"
    summary_groupby:
      vars: ["patrol_subject"]
    summary_metrics:
      metrics:
        - {metric: patrol_count}
        - {metric: total_distance, unit: km}
        - {metric: total_duration, unit: h}

spatial-grouped:
  name: Spatial Grouped
  description: >-
    Mocked IO — exercises the Spatial grouper: the mock
    get_spatial_features_group fixture returns the "SpatialGrouperTest" group
    (Central/East/West regions), hitting the resolver tasks and
    add_spatial_index.
  mock_io: true
  params:
    workflow_details:
      name: "Patrol Effort Table"
      description: "Per-category patrol effort summary table."
    er_client_name:
      data_source:
        name: "er_asia"
    time_range:
      since: "2015-01-10T00:00:00"
      until: "2015-02-28T23:59:59"
      timezone:
        label: "UTC (UTC+00:00)"
        tzCode: "UTC"
        name: "(UTC+00:00) UTC"
        utc: "+00:00"
    er_patrol_params:
      patrol_types: ["demo_patrol"]
    groupers:
      groupers:
        - spatial_index_name: "SpatialGrouperTest"
    summary_groupby:
      vars: ["patrol_subject"]
    summary_metrics:
      metrics:
        - {metric: patrol_count}
        - {metric: total_distance, unit: km}
        - {metric: total_duration, unit: h}

custom-metrics:
  name: Custom Metrics
  description: >-
    Mocked IO — exercises the custom-metric escape hatch beyond Base: multiple
    custom metrics with different statistics (nunique, sum), explicit decimal
    places, and no unit conversion (the convert_units=false branch).
  mock_io: true
  params:
    workflow_details:
      name: "Patrol Effort Table"
      description: "Per-category patrol effort summary table."
    er_client_name:
      data_source:
        name: "er_asia"
    time_range:
      since: "2015-01-10T00:00:00"
      until: "2015-02-28T23:59:59"
      timezone:
        label: "UTC (UTC+00:00)"
        tzCode: "UTC"
        name: "(UTC+00:00) UTC"
        utc: "+00:00"
    er_patrol_params:
      patrol_types: ["demo_patrol"]
    groupers:
      groupers: []
    summary_groupby:
      vars: ["patrol_subject"]
    summary_metrics:
      metrics:
        - {metric: patrol_count}
        - {metric: custom, display_name: "Distinct Serials", aggregator: nunique,
           column: patrol_serial_number, decimal_places: 0}
        - {metric: custom, display_name: "Total Distance (m)", aggregator: sum,
           column: dist_meters, decimal_places: 1}

mep_dev:
  name: MEP Dev
  description: >-
    Live EarthRanger (mep-dev), 10 Jan - 28 Feb 2015 seeded ecoscope_patrol data
    (same window/type as wt-download-patrols' live cases).
  mock_io: false
  params:
    workflow_details:
      name: "Patrol Effort Table"
      description: "Per-category patrol effort summary table."
    er_client_name:
      data_source:
        name: "mep_dev"
    time_range:
      since: "2015-01-10T00:00:00"
      until: "2015-02-28T23:59:59"
      timezone:
        label: "Africa/Nairobi (UTC+03:00)"
        tzCode: "Africa/Nairobi"
        name: "(UTC+03:00) Nairobi"
        utc: "+03:00"
    er_patrol_params:
      patrol_types: ["ecoscope_patrol"]
      status: ["done"]
    groupers:
      groupers: []
    summary_groupby:
      vars: ["patrol_subject"]
    summary_metrics:
      metrics:
        - {metric: patrol_count}
        - {metric: total_distance, unit: km}
        - {metric: total_duration, unit: h}
        - {metric: patrol_days}
        - {metric: area_covered_merged, swath_width_meters: 500.0}
        - {metric: area_covered_unmerged, swath_width_meters: 500.0}
