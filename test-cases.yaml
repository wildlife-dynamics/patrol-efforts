base:
  name: Base
  description: Mocked IO — primary development case (no credentials needed).
  mock_io: true
  params:
    workflow_details:
      name: "Patrol Efforts"
      description: "Per-category patrol effort summary, coverage and event density."
    er_client_name:
      data_source:
        name: "er_asia"
    time_range:
      since: "2026-05-01T00:00:00"
      until: "2026-05-06T23:59:59"
      timezone:
        label: "UTC (UTC+00:00)"
        tzCode: "UTC"
        name: "(UTC+00:00) UTC"
        utc: "+00:00"
    er_patrol_and_events_params:
      patrol_types: ["demo_patrol"]
      event_types: ["wildlife_sighting_rep"]
    groupers:
      groupers: []                      # single view; set a grouper to split
    set_traj_color_column:
      var: "patrol_subject"
    set_event_color_column:
      var: "event_type"
    summary_table_df:
      groupby_cols: ["patrol_subject"]
      summary_params:
        - {display_name: "Patrol Count", aggregator: nunique, column: patrol_id}
        - {display_name: "Total Distance (km)", aggregator: sum, column: dist_meters, original_unit: m, new_unit: km, decimal_places: 1}
        - {display_name: "Total Duration (hrs)", aggregator: sum, column: timespan_seconds, original_unit: s, new_unit: h, decimal_places: 1}
        - {display_name: "Patrol Days", aggregator: nunique, column: segment_start_date}
        - {display_name: "Merged Area Covered (km²)", aggregator: coverage_area, merged: true, swath_width_meters: 500.0, decimal_places: 1}
        - {display_name: "Unmerged Area Covered (km²)", aggregator: coverage_area, merged: false, swath_width_meters: 500.0, decimal_places: 1}
    grouped_coverage_density:
      sum_column: timespan_seconds
    base_map_defs:
      base_maps:
        - url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}"
          opacity: 1.0

