base:
  name: Base
  description: Mocked IO — primary development case (no credentials needed).
  mock_io: true
  params:
    workflow_details:
      name: "Patrol Efforts"
      description: "Per-category patrol effort summary, coverage and event density."
    er_client_name:
      data_source:
        name: "er_asia"
    time_range:
      since: "2015-01-10T00:00:00"
      until: "2015-02-28T23:59:59"
      timezone:
        label: "UTC (UTC+00:00)"
        tzCode: "UTC"
        name: "(UTC+00:00) UTC"
        utc: "+00:00"
    er_patrol_and_events_params:
      patrol_types: ["demo_patrol"]
      event_types: ["wildlife_sighting_rep"]
    groupers:
      groupers: []                      # single view; set a grouper to split
    set_traj_color_column:
      var: "patrol_subject"
    set_event_color_column:
      var: "event_type"
    summary_groupby:
      # two aggregators: exercises multi-column grouping + header renames
      vars: ["patrol_subject", "patrol_type__value"]
    summary_metrics:
      metrics:
        - {metric: patrol_count}
        - {metric: total_distance, unit: km}
        - {metric: total_duration, unit: h}
        - {metric: patrol_days}
        - {metric: area_covered_merged, swath_width_meters: 500.0}
        - {metric: area_covered_unmerged, swath_width_meters: 500.0}
        # exercises the custom escape hatch incl. checkbox-gated unit conversion
        - {metric: custom, display_name: "Avg Leg Distance (km)", aggregator: mean,
           column: dist_meters, convert_units: true, original_unit: m, new_unit: km}
    density_weighting:
      sum_column: timespan_seconds
    base_map_defs:
      base_maps:
        - url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}"
          opacity: 1.0

